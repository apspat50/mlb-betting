name: Daily Batter Picks

on:
  schedule:
    - cron: '30 16 * * *'  # 12:30 PM EDT (16:30 UTC) — after lineups post
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-batter-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get today's date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore batter Statcast cache
        uses: actions/cache@v4
        with:
          path: cache/statcast_bat/
          key: ${{ runner.os }}-statcast-bat-${{ steps.date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-statcast-bat-

      - name: Create config from secrets
        run: |
          echo '{"telegram_token":"${{ secrets.TELEGRAM_TOKEN }}","chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","bankroll":1000,"min_edge":0.06}' > config.json

      - name: Pull latest predictions (from pitcher picks run)
        run: git pull --rebase origin main || true

      - name: Run and send batter picks
        run: python daily_batter_picks.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save batter Statcast cache
        uses: actions/cache@v4
        with:
          path: cache/statcast_bat/
          key: ${{ runner.os }}-statcast-bat-${{ steps.date.outputs.date }}

      - name: Commit predictions to repo
        continue-on-error: true
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          git diff --staged --quiet || git commit -m "predictions: ${{ steps.date.outputs.date }} (batters)"
          git push origin HEAD:main || (git pull origin main && git push origin HEAD:main)
