name: Daily Results Check

on:
  schedule:
    - cron: '30 3 * * *'  # 11:30 PM EDT (03:30 UTC next day)
  workflow_dispatch:

jobs:
  check-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get yesterday's date
        id: date
        run: echo "date=$(date -d 'yesterday' +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create config from secrets
        run: |
          echo '{"telegram_token":"${{ secrets.TELEGRAM_TOKEN }}","chat_id":"${{ secrets.TELEGRAM_CHAT_ID }}","bankroll":1000,"min_edge":0.06}' > config.json

      - name: Pull latest predictions
        run: git pull origin main || true

      - name: Run results check and send to Telegram
        run: python daily_results.py --date ${{ steps.date.outputs.date }}
        env:
          PYTHONUNBUFFERED: "1"
