name: Daily MLB Props Picks

on:
  schedule:
    - cron: '0 14 * * *'   # 10:00 AM EDT (14:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get today's date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore Statcast pitcher cache
        uses: actions/cache@v4
        with:
          path: cache/statcast/
          key: ${{ runner.os }}-statcast-pit-${{ steps.date.outputs.date }}
          restore-keys: |
            ${{ runner.os }}-statcast-pit-

      - name: Cache model data
        uses: actions/cache@v4
        with:
          path: |
            props_data/
            saved_models/
          key: ${{ runner.os }}-models-v1

      - name: Create config from secrets
        run: |
          cat > config.json << EOF
          {
            "telegram_token": "${{ secrets.TELEGRAM_TOKEN }}",
            "chat_id": "${{ secrets.TELEGRAM_CHAT_ID }}",
            "bankroll": 1000,
            "min_edge": 0.06
          }
          EOF

      - name: Run and send daily pitcher picks
        run: python daily_picks.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Save Statcast pitcher cache
        uses: actions/cache@v4
        with:
          path: cache/statcast/
          key: ${{ runner.os }}-statcast-pit-${{ steps.date.outputs.date }}

      - name: Commit predictions to repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions/
          git diff --staged --quiet || git commit -m "predictions: ${{ steps.date.outputs.date }} (pitchers)"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push origin HEAD && break
            echo "Push attempt $i failed, retrying in ${i}s..."
            sleep $i
          done
